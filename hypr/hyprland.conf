#polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

#Screen Sharing
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# machine-specific configuration
monitor=,1920x1080,auto,1

#For Keyboard
exec-once=fcitx5 -D

#Notification
exec-once=dunst

#StatusBar
exec-once=waybar

#Set Wallpaper
exec-once=swaybg -o \* -i ~/.config/hypr/wallpaper/wallpaper.jpg -m fill

#Wifi
exec-once=nm-applet --indicator

#Bluetooth
exec-once=blueman-applet

#Sleep
exec-once=~/.config/hypr/scripts/swayidle.sh

input {
    kb_file=
    kb_layout=us
    kb_variant=intl
    kb_model=
    kb_options=
    kb_rules=
    follow_mouse=1

    touchpad {
    natural_scroll=1
    disable_while_typing=1
    tap-to-click=1
}

    sensitivity=0 # -1.0 - 1.0, 0 means no modification.
}

general {
    sensitivity=1.0 # for mouse cursor
    gaps_in=5
    gaps_out=5
    border_size=1
    apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)
 #   damage_tracking=full # leave it on full unless you hate your GPU and want to make it suffer
    #col.active_border = rgba(ffffffee)
    #col.inactive_border = rgba(cececeaa)
    layout=dwindle
    col.active_border=rgb(cdd6f4)
    col.inactive_border = rgba(595959aa)
}
#Decoration section in theme file

decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    drop_shadow=true
    shadow_range=30
    shadow_render_power=3
    col.shadow=0x66000000
    rounding=10
    multisample_edges=true
    blur {
    	enabled = true
	size = 3
	new_optimizations = on
	blurls = waybar
    }
}

animations {
    enabled=true
    bezier=pace,0.46, 1, 0.29, 0.99
    bezier=overshot,0.13,0.99,0.29,1.1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    animation=windowsIn,1,6,md3_decel,slide
    animation=windowsOut,1,6,md3_decel,slide
    animation=windowsMove,1,6,md3_decel,slide
    animation=fade,1,10,md3_decel
    animation=workspaces,1,7,md3_decel,slide
    animation=specialWorkspace,1,8,md3_decel,slide
    #animation=border,0,3,md3_decel
}

dwindle {
    pseudotile = true
    preserve_split = true
}
master {
    new_is_master=true
}

gestures {
    workspace_swipe=false
}

misc {
    animate_manual_resizes=true
    disable_splash_rendering = true
    disable_hyprland_logo=true
}

################################---WinDowRule---##############################
windowrule=float,system_monitor
windowrule=size 1000 760,system_monitor
windowrule=move 454 192,system_monitor
windowrule= tile, ^(Brave-browser)$

##############################################################################
#---------------------------KEY BLIND----------------------------------------#
##############################################################################

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive 
bind = $mainMod, ESCAPE, exit
bind = $mainMod, E, exec, thunar
bind = $mainMod, T, togglefloating
bind = $mainMod, B, exec, brave
bind = $mainMod, D, exec, wofi -w 3 -n --show drun -k "/dev/null"
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pseudo # dwindle
bind = $mainMod, J, togglesplit # dwindle

bind = $mainMod, L, exec, swaylock -C ~/.config/swaylock/config

bind = $mainMod, slash, exec, ~/dotfiles/waybar/scripts/menu.sh

#Screenshot
bind = $mainMod, P, exec, slurp | grim -g - ~/Pictures/screenshots/$(date +'%Y-%m-%d-%H%M%S.png')

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, down, resizeactive, 0 100

# Input/Output volumes

bind = $mainMod ALT, F12, exec, pactl set-sink-volume @DEFAULT_SINK@ +1% 
bind = $mainMod ALT, F11, exec, pactl set-sink-volume @DEFAULT_SINK@ -1% 
bind = $mainMod ALT, F10, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle 

bind = $mainMod CTRL, F12, exec, pactl set-source-volume @DEFAULT_SOURCE@ +1% 
bind = $mainMod CTRL, F11, exec, pactl set-source-volume @DEFAULT_SOURCE@ -1% 
bind = $mainMod CTRL, F10, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle 

# Brightness

bind = $mainMod ALT, 1, exec, brightnessctl s 1%-
bind = $mainMod ALT, 2, exec, brightnessctl s +1% 
