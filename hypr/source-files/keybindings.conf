$mainMod = SUPER

bind = $mainMod, A, exec, alacritty
bind = $mainMod, B, exec, brave
bind = $mainMod, C, exec, chromium
bind = $mainMod, D, exec, wofi -w 3 -n --show drun -k "/dev/null"
bind = $mainMod, E, exec, thunar
bind = $mainMod, F, fullscreen
bind = $mainMod, J, togglesplit # dwindle
bind = $mainMod, K, exec, kitty
bind = $mainMod, L, exec, swaylock -f -C ~/.config/swaylock/config
bind = $mainMod, N, exec, ~/.config/hypr/scripts/notifications.sh
bind = $mainMod, P, pseudo # dwindle
bind = $mainMod, Q, killactive
bind = $mainMod, S, exec, slurp | grim -g - ~/Pictures/screenshots/$(date +'%Y-%m-%d-%H%M%S.png')
bind = $mainMod, T, togglefloating
bind = $mainMod, V, exec, cliphist list | wofi --dmenu -W 50% -H 50% -n | cliphist decode | wl-copy
bind = $mainMod, Y, exec, kitty -- bash -c "nvim ~/.todo"

bind = $mainMod, slash, exec, ~/dotfiles/waybar/scripts/menu.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 0

bind = $mainMod, s, togglespecialworkspace
bind = $mainMod SHIFT, s, movetoworkspace, special

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, down, resizeactive, 0 100

# Input/Output volumes

bind = $mainMod CTRL, up, exec, pactl set-sink-volume @DEFAULT_SINK@ +1%
bind = $mainMod CTRL, down, exec, pactl set-sink-volume @DEFAULT_SINK@ -1%
bind = $mainMod CTRL, 0, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

bind = $mainMod ALT, up, exec, pactl set-source-volume @DEFAULT_SOURCE@ +1%
bind = $mainMod ALT, down, exec, pactl set-source-volume @DEFAULT_SOURCE@ -1%
bind = $mainMod ALT, 0, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness

bind = $mainMod CTRL, left, exec, brightnessctl s 1%-
bind = $mainMod CTRL, right, exec, brightnessctl s +1%
