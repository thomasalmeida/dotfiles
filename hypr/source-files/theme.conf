
dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_is_master = true
}

general {
  sensitivity = 1.0
  gaps_in = 5
  gaps_out = 5
  border_size = 1
  apply_sens_to_raw = 0
  layout = dwindle
  col.active_border = rgba(ff69b4ff) rgba(87ceebff) 45deg
  col.inactive_border = rgba(595959aa)
}

decoration {
  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0
  drop_shadow = true
  shadow_range = 30
  shadow_render_power = 3
  col.shadow = 0x66000000
  rounding = 10
  blur {
    enabled = true
    size = 3
    new_optimizations = on
    blurls = waybar
  }
}
